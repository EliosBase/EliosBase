name: post-deploy-smoke

on:
  deployment_status:

permissions:
  contents: read

concurrency:
  group: post-deploy-smoke-${{ github.event.deployment_status.environment || github.sha }}
  cancel-in-progress: true

jobs:
  smoke:
    if: github.event.deployment_status.state == 'success' && github.event.deployment_status.target_url != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run deployed smoke checks
        run: npm run smoke:real
        env:
          SMOKE_BASE_URL: ${{ github.event.deployment_status.target_url }}
          SMOKE_CRON_SECRET: ${{ secrets.SMOKE_CRON_SECRET }}
          SMOKE_SESSION_COOKIE: ${{ secrets.SMOKE_SESSION_COOKIE }}
