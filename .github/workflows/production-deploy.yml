name: production-deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  production-deploy:
    name: production-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_TEAM_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Guard required Vercel config
        run: |
          set -eu
          missing=()
          if [ -z "${VERCEL_TOKEN:-}" ]; then missing+=("VERCEL_TOKEN"); fi
          if [ -z "${VERCEL_ORG_ID:-}" ]; then missing+=("VERCEL_TEAM_ID"); fi
          if [ -z "${VERCEL_PROJECT_ID:-}" ]; then missing+=("VERCEL_PROJECT_ID"); fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required Vercel configuration: ${missing[*]}"
            exit 1
          fi

      - name: Pull production environment
        run: npx vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build production artifacts
        run: npx vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy prebuilt artifacts to production
        id: deploy
        run: |
          set -eu
          deploy_output=$(npx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN" 2>&1 | tee /tmp/vercel-prod-deploy.log)
          deployment_url=$(printf '%s\n' "$deploy_output" | grep -Eo 'https://[^[:space:]]+\.vercel\.app' | tail -n1)
          if [ -z "$deployment_url" ]; then
            echo "::error::Failed to parse production deployment URL from Vercel CLI output"
            cat /tmp/vercel-prod-deploy.log
            exit 1
          fi
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $deployment_url"

      - name: Wait for eliosbase.net to serve new deployment
        run: |
          set -eu
          for attempt in $(seq 1 30); do
            status=$(curl -sS -o /tmp/prod-ready.json -w '%{http_code}' "https://eliosbase.net/api/ready" || true)
            if [ "$status" = "200" ]; then
              echo "Production is live at https://eliosbase.net"
              exit 0
            fi
            echo "Attempt $attempt: /api/ready returned $status, retrying in 15s..."
            sleep 15
          done
          echo "::error::Timed out waiting for https://eliosbase.net/api/ready to return 200"
          cat /tmp/prod-ready.json 2>/dev/null || true
          exit 1
