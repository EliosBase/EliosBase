name: release-gate

on:
  workflow_run:
    workflows: ["post-deploy-smoke"]
    types: [completed]

permissions:
  contents: read
  issues: write

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check smoke test result
        id: check
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
            echo "Smoke tests passed — deployment is healthy."
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
            echo "::error::Smoke tests failed — deployment may be unhealthy."
          fi

      - name: Create issue on failure
        if: steps.check.outputs.result == 'fail'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.payload.workflow_run.id}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Post-deploy smoke tests failed`,
              body: [
                `## Smoke Test Failure`,
                ``,
                `The post-deploy smoke tests failed after a deployment.`,
                ``,
                `**Run:** ${runUrl}`,
                `**Branch:** \`${context.payload.workflow_run.head_branch}\``,
                `**SHA:** \`${context.payload.workflow_run.head_sha.slice(0, 8)}\``,
                `**Time:** ${new Date().toISOString()}`,
                ``,
                `### Action Required`,
                `1. Check the [smoke test logs](${runUrl})`,
                `2. If the deployment is broken, roll back via Vercel dashboard`,
                `3. Fix the root cause and re-deploy`,
              ].join('\n'),
              labels: ['incident', 'P0'],
            });

      - name: Summary
        run: |
          echo "### Release Gate Result" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check.outputs.result }}" = "pass" ]; then
            echo "✅ Smoke tests passed. Deployment is healthy." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Smoke tests failed. Issue created for investigation." >> "$GITHUB_STEP_SUMMARY"
          fi
