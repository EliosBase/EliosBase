name: refresh-main-status

on:
  pull_request_target:
    types:
      - closed

permissions:
  actions: write
  contents: read

concurrency:
  group: refresh-main-status-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dispatch:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Dispatch main status workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          BASE_URL: https://eliosbase.net
        run: |
          set -eu

          gh workflow run validate.yml --repo "$REPOSITORY" --ref "$BASE_BRANCH"
          gh workflow run codeql.yml --repo "$REPOSITORY" --ref "$BASE_BRANCH"
          gh workflow run identity-guard.yml --repo "$REPOSITORY" --ref "$BASE_BRANCH"
          gh workflow run real-smoke.yml --repo "$REPOSITORY" --ref "$BASE_BRANCH" -f base_url="$BASE_URL"
