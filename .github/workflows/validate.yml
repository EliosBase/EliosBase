name: validate

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - '**'

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run contract tests
        run: forge test -vvv

      - name: Check contract sizes
        run: |
          forge build --sizes 2>&1 | tee /tmp/sizes.txt
          if grep -E '\|\s+\d+\.\d+\s*\|' /tmp/sizes.txt | awk -F'|' '{gsub(/[[:space:]]/, "", $3); if ($3+0 > 24.0) exit 1}'; then
            echo "All contracts under 24KB limit"
          else
            echo "::error::One or more contracts exceed the 24KB size limit"
            exit 1
          fi
