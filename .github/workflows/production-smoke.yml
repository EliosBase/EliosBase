name: production-smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Override the production base URL
        required: false
        type: string
      task_id:
        description: Optional completed task id for protected result verification
        required: false
        type: string
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  production-smoke:
    name: production-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    defaults:
      run:
        working-directory: frontend
    env:
      BASE_URL: ${{ inputs.base_url || vars.PRODUCTION_BASE_URL || 'https://eliosbase.net' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for production deployment
        run: |
          set -eu

          for attempt in $(seq 1 30); do
            status=$(curl -sS -o /tmp/production-ready.json -w '%{http_code}' "$BASE_URL/api/ready" || true)
            if [ "$status" = "200" ]; then
              echo "Production is ready at $BASE_URL"
              exit 0
            fi

            sleep 20
          done

          echo "::error::Timed out waiting for $BASE_URL/api/ready"
          cat /tmp/production-ready.json 2>/dev/null || true
          exit 1

      - name: Run production smoke checks
        run: npm run smoke:real
        env:
          SMOKE_BASE_URL: ${{ env.BASE_URL }}
          SMOKE_TASK_ID: ${{ inputs.task_id }}
          SMOKE_CRON_SECRET: ${{ secrets.SMOKE_CRON_SECRET }}
          SMOKE_SESSION_COOKIE: ${{ secrets.SMOKE_SESSION_COOKIE }}
          SMOKE_SIWE_PRIVATE_KEY: ${{ secrets.SMOKE_SIWE_PRIVATE_KEY }}
          SMOKE_AGENT_ID: ${{ secrets.SMOKE_AGENT_ID }}
