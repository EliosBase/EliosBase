name: staging-smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Override the staging base URL
        required: false
        type: string
      task_id:
        description: Optional completed task id for protected result verification
        required: false
        type: string
  push:
    branches:
      - staging

permissions:
  contents: read

concurrency:
  group: staging-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  staging-smoke:
    name: staging-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging
    defaults:
      run:
        working-directory: frontend
    env:
      BASE_URL: ${{ inputs.base_url || vars.STAGING_BASE_URL || 'https://staging.eliosbase.net' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for staging deployment
        run: |
          set -eu

          for attempt in $(seq 1 30); do
            status=$(curl -sS -o /tmp/staging-ready.json -w '%{http_code}' "$BASE_URL/api/ready" || true)
            if [ "$status" = "200" ]; then
              echo "Staging is ready at $BASE_URL"
              exit 0
            fi

            sleep 20
          done

          echo "::error::Timed out waiting for $BASE_URL/api/ready"
          cat /tmp/staging-ready.json 2>/dev/null || true
          exit 1

      - name: Run staging smoke checks
        run: npm run smoke:real
        env:
          SMOKE_BASE_URL: ${{ env.BASE_URL }}
          SMOKE_TASK_ID: ${{ inputs.task_id }}
          SMOKE_CRON_SECRET: ${{ secrets.STAGING_SMOKE_CRON_SECRET }}
          SMOKE_SESSION_COOKIE: ${{ secrets.STAGING_SMOKE_SESSION_COOKIE }}
          SMOKE_SIWE_PRIVATE_KEY: ${{ secrets.STAGING_SMOKE_SIWE_PRIVATE_KEY }}
          SMOKE_SIWE_CHAIN_ID: ${{ vars.STAGING_SIWE_CHAIN_ID }}
          SMOKE_AGENT_ID: ${{ secrets.STAGING_SMOKE_AGENT_ID }}
          SMOKE_TASK_CREATE_BODY: ${{ secrets.STAGING_SMOKE_TASK_CREATE_BODY }}
          SMOKE_HIRE_BODY: ${{ secrets.STAGING_SMOKE_HIRE_BODY }}
          SMOKE_TX_SYNC_BODY: ${{ secrets.STAGING_SMOKE_TX_SYNC_BODY }}
