name: preview-smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Override the preview base URL
        required: false
        type: string
      task_id:
        description: Optional completed task id for protected result verification
        required: false
        type: string
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: preview-smoke-${{ github.event.pull_request.number || inputs.base_url || github.ref }}
  cancel-in-progress: true

jobs:
  preview-smoke:
    name: preview-smoke
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.base.ref == github.event.repository.default_branch && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    env:
      BASE_URL_OVERRIDE: ${{ inputs.base_url }}
      PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_PROTECTION_BYPASS }}
    steps:
      - name: Checkout trusted smoke runner
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha || github.event.repository.default_branch }}
          submodules: recursive

      - name: Detect preview-relevant changes
        id: scope
        uses: actions/github-script@v8
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('needs_preview', 'true');
              core.setOutput('summary', 'Manual run. Preview smoke will execute.');
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const needsPreview = files.some((file) => file.filename.startsWith('frontend/'));
            core.setOutput('needs_preview', needsPreview ? 'true' : 'false');
            core.setOutput(
              'summary',
              needsPreview
                ? 'Frontend changes detected. Preview smoke will execute.'
                : 'No frontend changes detected. Preview smoke skipped.',
            );

      - name: Setup Node
        if: steps.scope.outputs.needs_preview == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.scope.outputs.needs_preview == 'true'
        run: npm ci

      - name: Checkout PR source for fallback preview deploy
        if: steps.scope.outputs.needs_preview == 'true' && github.event_name == 'pull_request_target'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: preview-source
          submodules: recursive
          persist-credentials: false

      - name: Resolve preview deployment
        id: preview
        if: steps.scope.outputs.needs_preview == 'true'
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          ;(async () => {
            const output = process.env.GITHUB_OUTPUT;
            const baseUrlOverride = process.env.BASE_URL_OVERRIDE?.trim();

            if (baseUrlOverride) {
              fs.appendFileSync(output, `base_url=${baseUrlOverride}\n`);
              process.exit(0);
            }

            const missing = ['VERCEL_PROJECT_ID', 'VERCEL_TEAM_ID', 'VERCEL_TOKEN', 'PR_HEAD_SHA', 'PR_HEAD_REF']
              .filter((name) => !process.env[name]);

            if (missing.length > 0) {
              throw new Error(`Missing preview deployment config: ${missing.join(', ')}`);
            }

            const headers = { Authorization: `Bearer ${process.env.VERCEL_TOKEN}` };
            const endpoint = new URL('https://api.vercel.com/v6/deployments');
            endpoint.searchParams.set('projectId', process.env.VERCEL_PROJECT_ID);
            endpoint.searchParams.set('teamId', process.env.VERCEL_TEAM_ID);
            endpoint.searchParams.set('limit', '20');

            const sha = process.env.PR_HEAD_SHA;
            const ref = process.env.PR_HEAD_REF;

            for (let attempt = 1; attempt <= 5; attempt += 1) {
              const res = await fetch(endpoint, { headers });
              if (!res.ok) {
                throw new Error(`Failed to list Vercel deployments (${res.status})`);
              }

              const data = await res.json();
              const deployments = Array.isArray(data.deployments) ? data.deployments : [];
              const branchDeployments = deployments.filter((deployment) => {
                if (deployment.target === 'production') {
                  return false;
                }

                const meta = deployment.meta || {};
                const deploymentRef = meta.githubCommitRef || meta.gitCommitRef;
                return deploymentRef === ref;
              });

              const exactDeployment = branchDeployments.find((deployment) => {
                const meta = deployment.meta || {};
                const deploymentSha = meta.githubCommitSha || meta.gitCommitSha;
                return deploymentSha === sha;
              });

              const readyDeployment = exactDeployment && (exactDeployment.readyState === 'READY' || exactDeployment.state === 'READY')
                ? exactDeployment
                : null;

              if (readyDeployment?.url) {
                const baseUrl = `https://${readyDeployment.url}`;
                fs.appendFileSync(output, `base_url=${baseUrl}\n`);
                console.log(`Resolved preview deployment: ${baseUrl}`);
                process.exit(0);
              }

              const currentState = exactDeployment?.readyState || exactDeployment?.state;
              console.log(
                currentState
                  ? `Attempt ${attempt}/5: preview for ${ref}@${sha} is ${currentState}`
                  : `Attempt ${attempt}/5: waiting for preview deployment for ${ref}@${sha}`,
              );

              await new Promise((resolve) => setTimeout(resolve, 20000));
            }

            fs.appendFileSync(output, 'needs_manual_deploy=true\n');
            console.log(`No matching preview deployment found for ${ref}@${sha}. Falling back to a manual Vercel preview deploy.`);
            process.exit(0);
          })().catch((error) => {
            console.error(error.stack || String(error));
            process.exit(1);
          });
          NODE

      - name: Create fallback preview deployment
        id: manual_preview
        if: steps.scope.outputs.needs_preview == 'true' && steps.preview.outputs.base_url == '' && steps.preview.outputs.needs_manual_deploy == 'true'
        working-directory: preview-source
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail

          npx vercel pull --yes --environment=preview --token "$VERCEL_TOKEN"

          deploy_output=$(
            npx vercel deploy \
              --yes \
              --archive=tgz \
              --token "$VERCEL_TOKEN" \
              --meta githubCommitRef="$PR_HEAD_REF" \
              --meta gitCommitRef="$PR_HEAD_REF" \
              --meta githubCommitSha="$PR_HEAD_SHA" \
              --meta gitCommitSha="$PR_HEAD_SHA" \
              2>&1 | tee /tmp/vercel-preview-deploy.log
          )

          base_url=$(printf '%s\n' "$deploy_output" | grep -Eo '(https://)?[^[:space:]]+\.vercel\.app' | tail -n1)
          if [ -z "$base_url" ]; then
            echo "::error::Failed to parse preview deployment URL from Vercel CLI output"
            cat /tmp/vercel-preview-deploy.log
            exit 1
          fi

          case "$base_url" in
            https://*) ;;
            *) base_url="https://$base_url" ;;
          esac

          echo "base_url=$base_url" >> "$GITHUB_OUTPUT"
          echo "Created fallback preview deployment: $base_url"

      - name: Wait for preview readiness
        if: steps.scope.outputs.needs_preview == 'true'
        env:
          BASE_URL: ${{ steps.preview.outputs.base_url || steps.manual_preview.outputs.base_url }}
        run: |
          set -eu
          cookie_jar=/tmp/preview-vercel-cookies.txt
          rm -f "$cookie_jar"

          for attempt in $(seq 1 30); do
            if [ -n "${VERCEL_PROTECTION_BYPASS:-}" ]; then
              status=$(curl -sS \
                -L \
                -c "$cookie_jar" \
                -b "$cookie_jar" \
                -o /tmp/preview-ready.json \
                -w '%{http_code}' \
                "${BASE_URL}/api/ready?x-vercel-set-bypass-cookie=true&x-vercel-protection-bypass=${VERCEL_PROTECTION_BYPASS}" || true)
            else
              status=$(curl -sS -o /tmp/preview-ready.json -w '%{http_code}' "$BASE_URL/api/ready" || true)
            fi

            if [ "$status" = "200" ]; then
              echo "Preview is ready at $BASE_URL"
              exit 0
            fi

            sleep 20
          done

          echo "::error::Timed out waiting for $BASE_URL/api/ready"
          cat /tmp/preview-ready.json 2>/dev/null || true
          exit 1

      - name: Run preview smoke checks
        if: steps.scope.outputs.needs_preview == 'true'
        env:
          SMOKE_BASE_URL: ${{ steps.preview.outputs.base_url || steps.manual_preview.outputs.base_url }}
          SMOKE_TASK_ID: ${{ inputs.task_id }}
          SMOKE_VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_PROTECTION_BYPASS }}
        run: npm run smoke:real

      - name: Summary
        run: |
          echo "### Preview smoke" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.scope.outputs.summary }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.preview.outputs.base_url || steps.manual_preview.outputs.base_url }}" ]; then
            echo "${{ steps.preview.outputs.base_url || steps.manual_preview.outputs.base_url }}" >> "$GITHUB_STEP_SUMMARY"
          fi
