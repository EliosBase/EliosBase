name: identity-guard

on:
  workflow_dispatch:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: identity-guard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Mark hook scripts executable
        run: chmod +x scripts/identity_guard.sh .githooks/pre-commit .githooks/prepare-commit-msg .githooks/commit-msg .githooks/pre-push

      - name: Scan repository tree for blocked identifiers
        run: scripts/identity_guard.sh scan-tree
