name: real-smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Deployed base URL to smoke test
        required: true
        type: string
      task_id:
        description: Optional completed task id for protected result verification
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: real-smoke-${{ inputs.base_url }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run smoke checks
        run: npm run smoke:real
        env:
          SMOKE_BASE_URL: ${{ inputs.base_url }}
          SMOKE_TASK_ID: ${{ inputs.task_id }}
          SMOKE_CRON_SECRET: ${{ secrets.SMOKE_CRON_SECRET }}
          SMOKE_SESSION_COOKIE: ${{ secrets.SMOKE_SESSION_COOKIE }}
