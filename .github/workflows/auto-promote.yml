name: release-pr

on:
  workflow_dispatch:
  push:
    branches:
      - staging

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: release-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-pr:
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Create or update PR to main
        id: promote
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          HEAD_BRANCH: staging
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -eu

          if [ "$HEAD_BRANCH" = "$BASE_BRANCH" ]; then
            exit 0
          fi

          pr_url=$(gh pr list \
            --repo "$REPOSITORY" \
            --head "$HEAD_BRANCH" \
            --base "$BASE_BRANCH" \
            --state open \
            --json url \
            --jq '.[0].url')

          if [ -z "$pr_url" ]; then
            pr_url=$(gh pr create \
              --repo "$REPOSITORY" \
              --head "$HEAD_BRANCH" \
              --base "$BASE_BRANCH" \
              --title "release: staging to $BASE_BRANCH" \
              --body "Release PR generated from the staging branch after the latest staging update.")
          else
            gh pr edit "$pr_url" \
              --repo "$REPOSITORY" \
              --title "release: staging to $BASE_BRANCH" \
              --body "Release PR generated from the staging branch after the latest staging update."
          fi

          printf 'pr_url=%s\n' "$pr_url" >>"$GITHUB_OUTPUT"

      - name: Summary
        if: steps.promote.outputs.pr_url != ''
        run: |
          echo "### Release PR" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.promote.outputs.pr_url }}" >> "$GITHUB_STEP_SUMMARY"
