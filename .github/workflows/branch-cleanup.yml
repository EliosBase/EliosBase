name: branch-cleanup

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: branch-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref != github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Delete closed automation branch if it still exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -eu

          remote="https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git"

          if git ls-remote --exit-code --heads "$remote" "$BRANCH" >/dev/null 2>&1; then
            git push "$remote" --delete "$BRANCH"
          fi
