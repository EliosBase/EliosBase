[profile.default]
src = "contracts/src"
out = "contracts/out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[rpc_endpoints]
base = "${BASE_RPC_URL}"

[fuzz]
runs = 1000
max_test_rejects = 65536

[invariant]
runs = 256
depth = 50

[etherscan]
base = { key = "${BASESCAN_API_KEY}" }
